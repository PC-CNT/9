<figure>
{{- if (urls.Parse .Destination).IsAbs -}}
<img src="{{ (.Destination | safeURL) }}" {{- with .PlainText }} alt="{{ . }}" {{ end -}} loading="lazy">
{{- else -}}
<img src="{{ urls.JoinPath .Page.Permalink (.Destination | safeURL) }}" {{- with .PlainText }} alt="{{ . }}" {{ end -}} loading="lazy">
{{ end -}}
{{- with .Title -}}
<figcaption>{{ . }}</figcaption>
{{- end -}}
</figure>
